name: facehrm
description: FaceHRM - Face Recognition Human Resource Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management (no code generation)
  flutter_riverpod: ^3.2.1

  # HTTP client
  dio: ^5.7.0

  # Secure storage for tokens
  flutter_secure_storage: ^10.0.0

  # Navigation
  go_router: ^17.1.0

  # UI
  cupertino_icons: ^1.0.8

  # App version info (reads from build flags / pubspec)
  package_info_plus: ^8.1.3

  # Camera + face recognition
  camera: ^0.11.0
  google_mlkit_face_detection: ^0.12.0
  image: ^4.3.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
